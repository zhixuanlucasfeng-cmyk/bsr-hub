services:
  - type: web
    name: bsr-hub-core-api
    runtime: docker
    dockerfilePath: ./services/core-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: WEB_SUCCESS_URL
        sync: false
      - key: WEB_CANCEL_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: SERVICE_FEE_BPS
        value: "600"
      - key: RESERVATION_MINUTES
        value: "30"

